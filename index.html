<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Caption Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/favicon.ico">
</head>

<body>

    <div class="container-fluid pe-5">

        <div class="row" style="justify-content: space-between;">

            <!-- SIDEBAR -->
            <div class="col-lg-2 p-0">

                <div class="sidebar d-flex flex-column justify-content-between">

                    <!-- TOP SECTION -->
                    <div>

                        <!-- COMPANY LOGO -->
                        <div class="logo mb-4">
                            <img src="./assets/images/logo.png" class="img-fluid" style="max-width:120px;">
                        </div>

                        <!-- INSTRUCTIONS -->
                        <div class="sidebar-menu">

                            <h6 class="menu-title">Instructions</h6>

                            <ul class="nav flex-column">

                                <li class="nav-item">
                                    <span class="nav-link">1. Select Client</span>
                                </li>

                                <li class="nav-item">
                                    <span class="nav-link">2. Upload Creative</span>
                                </li>

                                <li class="nav-item">
                                    <span class="nav-link">3. Add Caption Direction</span>
                                </li>

                                <li class="nav-item">
                                    <span class="nav-link">4. Click Generate</span>
                                </li>

                            </ul>

                        </div>
                        

                    </div>


                    <!-- BOTTOM SECTION -->

                    <div class="sidebar-footer">

                        <ul class="nav flex-column">

                            <!-- <li class="nav-item">
                                <a class="nav-link" href="#">Settings</a>
                            </li> -->

                            <li class="nav-item">
                                <a class="nav-link" href="#">Help</a>
                            </li>

                        </ul>

                        <div class="sidebar-copyright mt-3">
                            <p class="mb-0">© 2026 Sit Down Design LLP</p>
                        </div>
                    </div>

                </div>

            </div>

            <div class="col-lg-9">

                <h2 class=" page-title py-5">
                    Instagram Caption & Hashtag Generator
                </h2>

                <div class="row" style="justify-content: space-between;">

                    <div class="col-md-5">
                        <!-- INPUT CARD -->
                        <h4 class="mb-3">Input Section</h4>
                        <div class="card dark-card p-4 mb-4 bg-new">

                            <div class="row g-3 input">

                                <div class="col-md-12">
                                    <label class="form-label">Select Client</label>

                                    <select id="client" class="form-select dark-input">
                                        <option value="monkeybar">Monkey Bar</option>
                                        <option value="cineport">Cineport</option>
                                        <option value="mrapexart">Mr Apexart</option>
                                    </select>
                                </div>


                                <div class="col-md-12">

                                    <label class="form-label">Upload Creative</label>

                                    <input type="file" id="imageUpload" class="form-control dark-input">

                                    <!-- Image Preview -->
                                    <div class="mt-3 text-center d-flex justify-content-center">

                                        <img id="preview" src="" alt="Image Preview" class="img-fluid preview-image"
                                            style="display:none;">

                                    </div>

                                </div>


                                <div class="col-12">

                                    <label class="form-label">Caption Direction</label>

                                    <textarea id="description" class="form-control dark-input" rows="3"
                                        placeholder="Describe the creative and tone..."></textarea>

                                </div>


                                <div class="col-12 text-center">

                                    <button class="btn generate-btn btn-primary" onclick="generateCaption()">
                                        Generate Captions
                                    </button>

                                </div>

                            </div>

                        </div>
                    </div>

                    <div class="col-md-6 me-5">
                        <!-- OUTPUT SECTION -->
                         <h4 class="mb-3">Output Section</h4>
                        <div id="output" style="overflow-y: scroll;"></div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="./script.js"></script>

    <script>

        document.getElementById("imageUpload").onchange = function (e) {

            const file = e.target.files[0];

            const reader = new FileReader();

            reader.onload = function () {

                const preview = document.getElementById("preview");

                preview.src = reader.result;

                preview.style.display = "block";

            }

            reader.readAsDataURL(file);

        }

    </script>

</body>

</html>
